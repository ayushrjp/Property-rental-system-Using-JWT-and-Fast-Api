<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RentManager | Premium Login</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <!-- Loading Overlay -->
    <div id="loader-overlay" class="loader-overlay d-none">
        <div class="spinner"></div>
    </div>

    <!-- Login Container -->
    <div class="login-container">
        <!-- Glowing Background Accents -->
        <div class="bg-glow-tr"></div>
        <div class="bg-glow-bl"></div>

        <!-- Glassmorphism Login Card -->
        <div class="login-card">
            <!-- Logo Icon -->
            <div class="login-logo-container">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path d="M19 2H9c-1.1 0-2 .9-2 2v3H3c-1.1 0-2 .9-2 2v11c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM5 20H3V9h2v11zm6 0H7v-3h4v3zm0-5H7v-3h4v3zm0-5H7V7h4v3zm8 10h-6v-3h2v-2h-2v-2h2v-2h-2V7h6v13zm-2-9h-2v2h2v-2zm0 4h-2v2h2v-2z"/>
                </svg>
            </div>

            <!-- Title Header -->
            <div class="login-header">
                <h1>Rent<span class="highlight">Manager</span></h1>
                <p>Property Rental Management System</p>
            </div>

            <!-- Glowing divider -->
            <div class="glow-divider">
                <div class="glow-dot"></div>
            </div>

            <form id="login-form">
                <!-- Alert Box -->
                <div id="login-error" class="alert alert-error d-none"></div>

                <!-- Email Input Wrapper -->
                <div class="input-wrapper">
                    <div class="input-icon-left">
                        <!-- Envelope Icon -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                    </div>
                    <input type="email" id="login-email" required placeholder="Email Address">
                </div>

                <!-- Password Input Wrapper -->
                <div class="input-wrapper">
                    <div class="input-icon-left">
                        <!-- Lock Icon -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                    </div>
                    <input type="password" id="login-password" required placeholder="Password">
                    <div class="input-icon-right" id="password-toggle">
                        <!-- Eye Icon -->
                        <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </div>
                </div>

                <!-- Options Row -->
                <div class="options-row">
                    <label class="remember-me">
                        <input type="checkbox" id="remember-me">
                        Remember me
                    </label>
                    <a href="#" class="forgot-link" onclick="showNotification('Please contact your administrator to reset your password.', 'error')">Forgot password?</a>
                </div>

                <!-- Sign In Button -->
                <button type="submit" class="signin-btn">
                    <span>Sign In</span>
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M10 17l5-5-5-5v10z"/>
                        <path d="M0 0h24v24H0z" fill="none"/>
                    </svg>
                </button>
            </form>

            <!-- Footer Details -->
            <div class="login-footer">
                <div class="login-footer-divider">or</div>
                <p>Don't have an account? <a href="#" onclick="showNotification('Only administrators can create user credentials. Please contact support.', 'error')">Contact Administrator</a></p>
            </div>
        </div>
    </div>

    <!-- Notification container -->
    <div id="notification-container" style="position: fixed; top: 20px; right: 20px; z-index: 9999; width: 320px;"></div>

    <!-- Javascripts -->
    <script src="/static/js/api.js"></script>
    <script src="/static/js/app.js"></script>
    <script>
        // Minimal password visibility toggle logic
        const toggleBtn = document.getElementById("password-toggle");
        const passwordInput = document.getElementById("login-password");
        const eyeIcon = document.getElementById("eye-icon");

        toggleBtn.addEventListener("click", () => {
            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                // Render Eye Off svg
                eyeIcon.innerHTML = `
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                `;
            } else {
                passwordInput.type = "password";
                // Render Eye open svg
                eyeIcon.innerHTML = `
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                `;
            }
        });
    </script>
</body>
</html>
